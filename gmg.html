<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMeansGo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #05080f;
    --surface0: #080e1a;
    --surface1: #0c1424;
    --surface2: #101c30;
    --border:   #16243a;
    --border2:  #1e3050;
    --text:     #c8d8ec;
    --muted:    #3a5570;
    --dim:      #1e3050;
    --accent:   #35c96e;
    --green:    #4cd46a;
    --gold:     #f0c040;
    --silver:   #8aaac0;
    --font-d: 'Barlow Condensed', sans-serif;
    --font-m: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-m); font-size: 13px;
    min-height: 100vh; padding: clamp(1rem, 3vw, 2rem);
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--surface0) 1px, transparent 1px), linear-gradient(90deg, var(--surface0) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.4; pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; }

  /* HEADER */
  header { margin-bottom: 1.2rem; }
  .eyebrow { font-size: 0.6rem; letter-spacing: 0.4em; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; }
  h1 { font-family: var(--font-d); font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; line-height: 1; color: #fff; margin-bottom: 0.4rem; }
  h1 em { color: var(--accent); font-style: normal; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.68rem; color: var(--muted); }

  /* STATUS */
  #status-bar {
    background: var(--surface1); border: 1px solid var(--border2); border-radius: 8px;
    padding: 0.6rem 1rem; margin-bottom: 1rem; font-size: 0.7rem;
    display: flex; align-items: center; gap: 0.8rem;
  }
  #status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; animation: pulse 2s infinite; }
  #status-bar.fetching .dot { background: var(--gold); }
  #status-bar.ready    .dot { background: var(--green); animation: none; }
  #status-bar.error    .dot { background: #f05050; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  #status-text { color: var(--text); flex: 1; }
  #progress-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 0.4rem; overflow: hidden; display: none; }
  #progress-bar.visible { display: block; }
  #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 1px; transition: width 0.3s; }

  /* NAV */
  nav {
    display: flex; gap: 0; margin-bottom: 1.2rem;
    border-bottom: 2px solid var(--border2);
  }
  .nav-btn {
    background: transparent; border: none; border-bottom: 2px solid transparent;
    margin-bottom: -2px; color: var(--muted);
    font-family: var(--font-d); font-size: 1.05rem; font-weight: 700; letter-spacing: 0.06em;
    padding: 0.5rem 1.1rem; cursor: pointer; transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .nav-btn:hover { color: var(--text); }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* PAIRS sub-tabs */
  .sub-tabs {
    display: flex; gap: 0.3rem; margin-bottom: 1rem;
    background: var(--surface0); padding: 0.25rem;
    border-radius: 8px; border: 1px solid var(--border);
  }
  .sub-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.3rem;
    background: transparent; border: none; color: var(--muted);
    font-family: var(--font-d); font-size: 1rem; font-weight: 700; letter-spacing: 0.06em;
    padding: 0.4rem; border-radius: 5px; cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .sub-btn .num { background: var(--surface1); border-radius: 3px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; }
  .sub-btn.active { background: var(--accent); color: #fff; }
  .sub-btn.active .num { background: rgba(255,255,255,0.2); }
  .sub-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* SEARCH */
  #player-search {
    width: 100%; background: var(--surface1); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font-m); font-size: 0.78rem;
    padding: 0.5rem 0.8rem; border-radius: 6px; outline: none; transition: border-color 0.15s;
    margin-bottom: 0.8rem;
  }
  #player-search:focus { border-color: var(--accent); }
  #player-search::placeholder { color: var(--muted); }

  .result-meta { font-size: 0.62rem; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.8rem; }

  /* PAIR CARDS */
  #cards { display: flex; flex-direction: column; gap: 0.5rem; }
  .card { border-radius: 8px; padding: 0.85rem 1rem; border: 1px solid var(--border); background: var(--surface0); animation: fadeIn 0.15s ease; }
  .card.top  { background: #0b1e08; border-color: #2a6012; }
  .card.high { background: var(--surface1); border-color: var(--border2); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }
  .card-top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
  .card-left { display: flex; align-items: center; gap: 0.6rem; }
  .rank-badge { width: 26px; height: 26px; border-radius: 50%; background: var(--surface0); display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; flex-shrink: 0; border: 2px solid var(--muted); }
  .card.top  .rank-badge { border-color: var(--gold);   color: var(--gold); }
  .card.high .rank-badge { border-color: var(--silver); color: var(--silver); }
  .count-block { display: flex; align-items: baseline; gap: 0.25rem; }
  .count-num { font-family: var(--font-d); font-size: 2rem; font-weight: 700; line-height: 1; color: var(--muted); }
  .card.top  .count-num { color: #6ad040; }
  .card.high .count-num { color: var(--accent); }
  .count-label { font-size: 0.58rem; color: var(--silver); letter-spacing: 0.12em; }
  .fresh-badge { font-size: 0.62rem; font-weight: 700; padding: 0.18rem 0.5rem; border-radius: 5px; border: 1px solid var(--border); color: var(--muted); background: var(--surface1); }
  .fresh-badge.hot  { background: #0a2a10; border-color: #1a6020; color: var(--green); }
  .fresh-badge.warm { background: #1a1a08; border-color: #5a5000; color: #c0b000; }
  .sgp-badge { font-size: 0.6rem; font-weight: 700; padding: 0.18rem 0.5rem; border-radius: 5px; border: 1px solid #5a4a00; color: var(--gold); background: #1e1a00; letter-spacing: 0.06em; }
  .players { display: flex; flex-wrap: wrap; gap: 0.28rem; margin-bottom: 0.6rem; }
  .player-chip { display: flex; align-items: center; gap: 0.22rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 0.18rem 0.55rem; }
  .player-photo { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface0); }
  .player-name { font-size: 0.73rem; color: #bdd0e8; font-weight: 600; }
  .player-hr   { font-size: 0.65rem; color: var(--accent); font-weight: 700; }
  .player-hr-lbl { font-size: 0.5rem; color: var(--muted); }
  .dates { display: flex; flex-wrap: wrap; gap: 0.25rem; }
  .date-pill { background: var(--surface0); border: 1px solid var(--border); border-radius: 4px; padding: 0.14rem 0.4rem; font-size: 0.63rem; color: var(--muted); }
  .date-pill.latest { background: #0f2a18; border-color: #1a5028; color: var(--green); font-weight: 700; }

  /* EMPTY / SPINNER */
  .empty { text-align: center; padding: 4rem 1rem; color: var(--dim); font-size: 0.85rem; border: 1px dashed var(--border); border-radius: 8px; }
  .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 4rem 1rem; border: 1px dashed var(--border); border-radius: 8px; }
  .spinner { width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--border2); border-top-color: var(--accent); animation: spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spinner-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

  /* STAT CHIPS */
  .stat-row { display: flex; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .stat-chip { background: var(--surface1); border: 1px solid var(--border2); border-radius: 6px; padding: 0.5rem 0.8rem; display: flex; flex-direction: column; gap: 0.2rem; min-width: 100px; }
  .stat-chip-val { font-family: var(--font-d); font-size: 1.5rem; font-weight: 700; line-height: 1; color: var(--accent); }
  .stat-chip-lbl { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

  /* TOTALS CHART */
  .chart-wrap { background: var(--surface0); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; position: relative; width: 100%; height: 320px; }
  .chart-legend { margin-top: 0.5rem; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; }
  .team-filter-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
  .team-filter-row label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
  select#team-select {
    background: var(--surface1); border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font-m); font-size: 0.72rem; padding: 0.35rem 0.6rem;
    border-radius: 5px; cursor: pointer; outline: none;
  }
  select#team-select:hover { border-color: var(--accent); }

  /* LEADERBOARD */
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th {
    font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;
    text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border2);
  }
  .lb-table th.r { text-align: right; }
  .lb-table td { padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .lb-table tr:hover td { background: var(--surface1); }
  .lb-rank { font-size: 0.65rem; color: var(--muted); font-weight: 700; width: 28px; }
  .lb-rank.gold   { color: var(--gold); }
  .lb-rank.silver { color: var(--silver); }
  .lb-rank.bronze { color: #c07840; }
  .lb-player { display: flex; align-items: center; gap: 0.5rem; }
  .lb-photo { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .lb-name  { font-size: 0.78rem; color: #bdd0e8; font-weight: 600; }
  .lb-team  { font-size: 0.6rem; color: var(--muted); }
  .lb-num   { font-size: 0.85rem; font-weight: 700; text-align: right; }
  .lb-num.hr-col { color: var(--accent); }
  .lb-num.stat-col { color: var(--silver); font-size: 0.75rem; }
  .lb-num.dim { color: var(--muted); font-size: 0.72rem; }

  /* DAY AFTER */
  .da-date-row { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.8rem; }
  .da-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; }
  .da-card {
    background: var(--surface0); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.7rem 0.8rem; display: flex; align-items: center; gap: 0.6rem;
    animation: fadeIn 0.1s ease;
  }
  .da-photo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .da-info { flex: 1; min-width: 0; }
  .da-name { font-size: 0.78rem; color: #bdd0e8; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .da-sub  { font-size: 0.6rem; color: var(--muted); }
  .da-hr-badge { font-family: var(--font-d); font-size: 1.3rem; font-weight: 700; color: var(--accent); line-height: 1; flex-shrink: 0; }

  footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.58rem; color: var(--dim); }

  .panel { display: none; }
  .panel.visible { display: block; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">MLB · 2026 · Stats API</p>
    <h1>Ron's <em>GreenMeansGo</em> Tool</h1>
    <div class="meta-row" id="meta-row"><span>Which dudes dong on the same day?</span></div>
  </header>

  <div id="status-bar">
    <div class="dot"></div>
    <span id="status-text">Loading…</span>
    <div style="margin-left:auto;font-size:0.65rem;color:var(--muted)" id="progress-label"></div>
    <button id="stop-btn" onclick="stopFetch()" style="display:none;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);font-family:var(--font-m);font-size:0.65rem;padding:0.2rem 0.6rem;border-radius:4px;cursor:pointer;">STOP</button>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <!-- TOP NAV -->
  <nav>
    <button class="nav-btn active" data-nav="pairs" onclick="switchNav('pairs')">Pairs</button>
    <button class="nav-btn" data-nav="totals" onclick="switchNav('totals')" disabled>Totals</button>
    <button class="nav-btn" data-nav="leaders" onclick="switchNav('leaders')" disabled>Leaders</button>
    <button class="nav-btn" data-nav="dayafter" onclick="switchNav('dayafter')" disabled>Day After</button>
  </nav>

  <!-- PAIRS PANEL -->
  <div id="panel-pairs" class="panel visible">
    <div class="sub-tabs">
      <button class="sub-btn active" data-size="2" onclick="switchPairSize(2)"><span class="num">2</span>Pairs</button>
      <button class="sub-btn" data-size="3" onclick="switchPairSize(3)"><span class="num">3</span>Trios</button>
      <button class="sub-btn" data-size="4" onclick="switchPairSize(4)"><span class="num">4</span>Quads</button>
    </div>
    <input type="text" id="player-search" placeholder="Filter by player name…" oninput="_render(activePairSize)" style="display:none;">
    <div class="result-meta" id="pairs-meta"></div>
    <div id="cards"><div class="empty">Fetch data to see results</div></div>
  </div>

  <!-- TOTALS PANEL -->
  <div id="panel-totals" class="panel">
    <div class="stat-row" id="totals-stats"></div>
    <div class="team-filter-row">
      <label>Team</label>
      <select id="team-select" onchange="renderTotals()">
        <option value="ALL">All Teams</option>
      </select>
    </div>
    <div class="chart-wrap">
      <canvas id="hrChart" role="img" aria-label="Line chart of home runs per game per day">Loading…</canvas>
    </div>
    <div class="chart-legend" id="chart-legend">
      HR / GAME PER DAY · hover for game count · <span style="color:#f0c040">— 7d</span> &nbsp;<span style="color:#e07030">— 14d</span> &nbsp;<span style="color:#a060e0">— 30d</span> rolling avg
    </div>
  </div>

  <!-- LEADERS PANEL -->
  <div id="panel-leaders" class="panel">
    <div class="result-meta" id="leaders-meta"></div>
    <div id="leaders-content"><div class="empty">Fetch data to see results</div></div>
  </div>

  <!-- DAY AFTER PANEL -->
  <div id="panel-dayafter" class="panel">
    <div class="da-date-row" id="da-date-row"></div>
    <div id="da-content"><div class="empty">Fetch data to see results</div></div>
  </div>

  <footer>
    <span>Source: MLB Stats API (statsapi.mlb.com)</span>
    <span id="footer-right"></span>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const MLB          = 'https://statsapi.mlb.com/api/v1';
const SEASON_START = '2026-03-26';

let dailyHRs    = {};
let dailyGames  = {};
let hrTotals    = {};
let playerIds   = {};
let playerTeams = {};
let playerABs   = {};
let playerGames = {};
let groupCache  = {};
let fetchedGameIds = new Set();
let teamGameDays = {};  // teamAbbr -> { date -> gameCount }

let activeNav      = 'pairs';
let activePairSize = 2;
let abort          = false;
let hrChart        = null;

// ── Helpers ────────────────────────────────────────────────────────────
function dateRange(start, end) {
  const dates = [], cur = new Date(start + 'T12:00:00Z'), last = new Date(end + 'T12:00:00Z');
  while (cur <= last) {
    dates.push(cur.toISOString().split('T')[0]);
    cur.setUTCDate(cur.getUTCDate() + 1);
  }
  return dates;
}
function fmtDate(d) {
  const [,m,day] = d.split('-');
  return ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m] + ' ' + +day;
}
function daysSince(d) {
  const [y,m,day] = d.split('-').map(Number);
  return Math.round((new Date() - new Date(y,m-1,day)) / 86400000);
}
function yesterday() {
  const d = new Date(); d.setUTCDate(d.getUTCDate() - 1);
  return d.toISOString().split('T')[0];
}

// ── Worker ─────────────────────────────────────────────────────────────
const WORKER_SRC = `
self.onmessage = function({data: {dailyHRs, size}}) {
  const nameToId = {}, idToName = [];
  for (const players of Object.values(dailyHRs))
    for (const name of Object.keys(players))
      if (!(name in nameToId)) { nameToId[name] = idToName.length; idToName.push(name); }
  const playerDayCounts = {};
  for (const players of Object.values(dailyHRs))
    for (const name of Object.keys(players))
      playerDayCounts[name] = (playerDayCounts[name] || 0) + 1;
  const minDays = size >= 3 ? 2 : 1;
  const counts = {};
  for (const [date, players] of Object.entries(dailyHRs)) {
    const ids = Object.keys(players).filter(n => playerDayCounts[n] >= minDays).map(n => nameToId[n]).sort((a,b)=>a-b);
    if (ids.length < size) continue;
    const n = ids.length;
    const idx = Array.from({length: size}, (_, i) => i);
    while (true) {
      const key = idx.map(i => ids[i]).join(',');
      if (!counts[key]) counts[key] = [];
      counts[key].push(date);
      let i = size - 1;
      while (i >= 0 && idx[i] === i + n - size) i--;
      if (i < 0) break;
      idx[i]++;
      for (let j = i+1; j < size; j++) idx[j] = idx[j-1]+1;
    }
  }
  const result = Object.entries(counts)
    .map(([key, dates]) => ({ players: key.split(',').map(id => idToName[+id]), count: dates.length, dates: dates.sort() }))
    .sort((a,b) => b.count - a.count || b.dates[b.dates.length-1].localeCompare(a.dates[a.dates.length-1]));
  self.postMessage(result);
};`;
function runInWorker(dailyHRs, size) {
  return new Promise(resolve => {
    const w = new Worker(URL.createObjectURL(new Blob([WORKER_SRC], {type:'application/javascript'})));
    w.onmessage = e => { resolve(e.data); w.terminate(); };
    w.postMessage({dailyHRs, size});
  });
}

// ── Fetch ──────────────────────────────────────────────────────────────
async function fetchAll() {
  abort = false;
  dailyHRs = {}; dailyGames = {}; hrTotals = {}; playerIds = {}; playerTeams = {};
  playerABs = {}; playerGames = {}; groupCache = {}; fetchedGameIds = new Set(); teamGameDays = {};
  disableNav(true);

  const from = SEASON_START;
  const to   = new Date().toISOString().split('T')[0];
  const dates = dateRange(from, to);

  setStatus('fetching', 'Fetching schedule…');
  document.getElementById('progress-bar').classList.add('visible');
  document.getElementById('stop-btn').style.display = '';

  const BATCH = 6;
  for (let i = 0; i < dates.length; i += BATCH) {
    if (abort) break;
    const batch = dates.slice(i, i + BATCH);
    setStatus('fetching', `Fetching ${fmtDate(batch[0])}…`);
    await Promise.all(batch.map(d => fetchDay(d).catch(() => {})));
    setProgress(Math.min(i + BATCH, dates.length), dates.length);
    if (i + BATCH < dates.length) await sleep(40);
  }

  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('progress-bar').classList.remove('visible');

  const daysWithData = Object.keys(dailyHRs).length;
  const totalHRCount = Object.values(hrTotals).reduce((a,b)=>a+b,0);
  setStatus('ready', `${daysWithData} game days · ${totalHRCount} HRs loaded`);

  const allDates = Object.keys(dailyHRs).sort();
  if (allDates.length) {
    document.getElementById('meta-row').innerHTML = `
      <span>📅 ${fmtDate(allDates[0])} – ${fmtDate(allDates[allDates.length-1])}</span>
      <span>⚾ ${totalHRCount} HRs</span>
      <span>📆 ${daysWithData} game days</span>`;
  }

  // Populate team dropdown
  const teams = [...new Set(Object.values(playerTeams))].sort();
  const sel = document.getElementById('team-select');
  sel.innerHTML = '<option value="ALL">All Teams</option>' + teams.map(t => `<option value="${t}">${t}</option>`).join('');

  disableNav(false);
  renderCurrentPanel();
  precompute(3);
  precompute(4);
}

async function fetchDay(date) {
  const sched = await fetch(`${MLB}/schedule?sportId=1&date=${date}&gameType=R`).then(r=>r.json());
  const games = sched.dates?.[0]?.games ?? [];
  const finalGames = games.filter(g => g.status?.abstractGameState === 'Final' && !fetchedGameIds.has(g.gamePk));
  const ids = finalGames.map(g => g.gamePk);
  ids.forEach(id => fetchedGameIds.add(id));
  if (!ids.length) return;
  dailyGames[date] = (dailyGames[date] || 0) + ids.length;

  await Promise.all(ids.map(async id => {
    try {
      const box = await fetch(`${MLB}/game/${id}/boxscore`).then(r=>r.json());
      for (const side of ['home','away']) {
        const t = box.teams?.[side] ?? {};
        const teamAbbr = t.team?.abbreviation ?? '';
        const batters = t.batters ?? [];
        const players = t.players ?? {};

        // track games per team per date for team-filtered totals
        if (teamAbbr) {
          if (!teamGameDays[teamAbbr]) teamGameDays[teamAbbr] = {};
          teamGameDays[teamAbbr][date] = (teamGameDays[teamAbbr][date] || 0) + 1;
        }

        for (const pid of batters) {
          const p = players[`ID${pid}`];
          if (!p) continue;
          const hrs = p?.stats?.batting?.homeRuns ?? 0;
          const abs = p?.stats?.batting?.atBats ?? 0;
          const name = p.person?.fullName ?? `ID${pid}`;

          playerABs[name]   = (playerABs[name]   || 0) + abs;
          playerGames[name] = (playerGames[name]  || 0) + 1;
          playerIds[name]   = pid;
          if (teamAbbr) playerTeams[name] = teamAbbr;

          if (hrs < 1) continue;
          if (!dailyHRs[date]) dailyHRs[date] = {};
          dailyHRs[date][name] = (dailyHRs[date][name] || 0) + hrs;
          hrTotals[name] = (hrTotals[name] || 0) + hrs;
        }
      }
    } catch(e) {}
  }));
}

function stopFetch() { abort = true; }

// ── Nav ────────────────────────────────────────────────────────────────
function switchNav(nav) {
  activeNav = nav;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.nav === nav));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
  document.getElementById('panel-' + nav).classList.add('visible');
  renderCurrentPanel();
}

function renderCurrentPanel() {
  if (activeNav === 'pairs')    buildAndRender(activePairSize);
  if (activeNav === 'totals')   renderTotals();
  if (activeNav === 'leaders')  renderLeaders();
  if (activeNav === 'dayafter') renderDayAfter();
}

function disableNav(disabled) {
  document.querySelectorAll('.nav-btn, .sub-btn').forEach(b => b.disabled = disabled);
}

// ── PAIRS ──────────────────────────────────────────────────────────────
const RENDER_LIMIT = 200;

async function precompute(size) {
  if (!groupCache[size]) groupCache[size] = await runInWorker(dailyHRs, size);
}

async function buildAndRender(size) {
  if (!Object.keys(dailyHRs).length) return;
  if (groupCache[size]) { _render(size); return; }
  document.getElementById('cards').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><span class="spinner-label">Computing…</span></div>';
  groupCache[size] = await runInWorker(dailyHRs, size);
  if (activePairSize === size && activeNav === 'pairs') _render(size);
}

function switchPairSize(size) {
  activePairSize = size;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.toggle('active', +b.dataset.size === size));
  const s = document.getElementById('player-search');
  if (s) s.value = '';
  if (Object.keys(dailyHRs).length) buildAndRender(size);
}

function _render(size) {
  const all      = groupCache[size] ?? [];
  const names    = { 2:'pairs', 3:'trios', 4:'quads' };
  const minCount = size === 2 ? 3 : 1;
  const query    = document.getElementById('player-search')?.value.trim().toLowerCase() ?? '';

  let groups = all.filter(item => item.count >= minCount);
  if (query) groups = groups.filter(item => item.players.some(p => p.toLowerCase().includes(query)));

  const maxCount = groups[0]?.count ?? 0;
  const shown    = Math.min(groups.length, RENDER_LIMIT);

  document.getElementById('pairs-meta').textContent =
    `${groups.length.toLocaleString()} unique ${names[size]}` +
    (size === 2 ? ' · min 3 occurrences' : '') +
    (query ? ` · filtered` : '') +
    (groups.length > RENDER_LIMIT ? ` · showing top ${RENDER_LIMIT}` : '');

  const searchEl = document.getElementById('player-search');
  searchEl.style.display = groups.length || query ? '' : 'none';

  const container = document.getElementById('cards');
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${query ? 'No results for "'+query+'"' : 'No co-occurrences found'}</div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  groups.slice(0, RENDER_LIMIT).forEach((item, i) => {
    const isTop  = item.count === maxCount;
    const isHigh = !isTop && i < 4;
    const lastDate = item.dates[item.dates.length - 1];
    const since  = daysSince(lastDate);
    const card   = document.createElement('div');
    card.className = 'card' + (isTop?' top':isHigh?' high':'');
    const freshClass = since <= 7 ? 'hot' : since <= 21 ? 'warm' : '';
    const teamBuckets = {};
    item.players.forEach(p => {
      const t = playerTeams[p];
      if (t) teamBuckets[t] = (teamBuckets[t]||[]).concat(p);
    });
    const sharedTeams = Object.entries(teamBuckets).filter(([,ps])=>ps.length>=2).map(([t])=>t);
    const playerChips = item.players.map(p => {
      const pid = playerIds[p];
      const photoUrl = pid ? `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_60,q_auto:best/v1/people/${pid}/headshot/67/current` : '';
      return `<div class="player-chip">${photoUrl?`<img class="player-photo" src="${photoUrl}" alt="">`:''}
        <span class="player-name">${p}</span>
        <span class="player-hr">${hrTotals[p]??'—'}</span>
        <span class="player-hr-lbl">HR</span></div>`;
    }).join('');
    const datePills = item.dates.map((d,di) =>
      `<span class="date-pill${di===item.dates.length-1?' latest':''}">${fmtDate(d)}</span>`).join('');
    card.innerHTML = `
      <div class="card-top-row">
        <div class="card-left">
          <div class="rank-badge">${i+1}</div>
          <div class="count-block"><span class="count-num">${item.count}</span><span class="count-label">OCCURRENCES</span></div>
          ${sharedTeams.map(t=>`<span class="sgp-badge">SGP · ${t}</span>`).join('')}
        </div>
        <div class="fresh-badge ${freshClass}">last: ${since}d ago</div>
      </div>
      <div class="players">${playerChips}</div>
      <div class="dates">${datePills}</div>`;
    frag.appendChild(card);
  });
  container.innerHTML = '';
  container.appendChild(frag);
  document.getElementById('footer-right').textContent = `${groups.length.toLocaleString()} groups · showing top ${shown}`;
}

// ── TOTALS ─────────────────────────────────────────────────────────────
function renderTotals() {
  const allDates = Object.keys(dailyHRs).sort();
  if (!allDates.length) return;

  const teamFilter = document.getElementById('team-select')?.value ?? 'ALL';

  const labels = [], hrPerGame = [];
  let seasonTotal = 0, totalGames = 0, peakVal = 0, peakDate = '';

  for (const date of allDates) {
    let dayHRs = 0, dayGames = 0;
    if (teamFilter === 'ALL') {
      dayHRs   = Object.values(dailyHRs[date]).reduce((a,b)=>a+b,0);
      dayGames = dailyGames[date] || 1;
    } else {
      // only count HRs from players on that team that day
      for (const [name, hrs] of Object.entries(dailyHRs[date])) {
        if (playerTeams[name] === teamFilter) dayHRs += hrs;
      }
      dayGames = teamGameDays[teamFilter]?.[date] || 0;
      if (!dayGames) continue;
    }
    const rate = Math.round((dayHRs / dayGames) * 100) / 100;
    labels.push(fmtDate(date));
    hrPerGame.push(rate);
    seasonTotal += dayHRs;
    totalGames  += dayGames;
    if (rate > peakVal) { peakVal = rate; peakDate = date; }
  }

  const avg = totalGames ? (seasonTotal / totalGames).toFixed(2) : '—';

  document.getElementById('totals-stats').innerHTML = `
    <div class="stat-chip"><span class="stat-chip-val">${seasonTotal.toLocaleString()}</span><span class="stat-chip-lbl">${teamFilter==='ALL'?'Season':'Team'} HRs</span></div>
    <div class="stat-chip"><span class="stat-chip-val">${totalGames.toLocaleString()}</span><span class="stat-chip-lbl">Games Played</span></div>
    <div class="stat-chip"><span class="stat-chip-val">${avg}</span><span class="stat-chip-lbl">HR / Game</span></div>
    <div class="stat-chip"><span class="stat-chip-val">${peakVal.toFixed(2)}</span><span class="stat-chip-lbl">Peak${peakDate?' · '+fmtDate(peakDate):''}</span></div>`;

  function makeMA(data, w) {
    return data.map((_, i) => {
      const slice = data.slice(Math.max(0, i-(w-1)), i+1);
      return Math.round(slice.reduce((a,b)=>a+b,0) / slice.length * 100) / 100;
    });
  }
  const roll7 = makeMA(hrPerGame, 7), roll14 = makeMA(hrPerGame, 14), roll30 = makeMA(hrPerGame, 30);

  if (hrChart) { hrChart.destroy(); hrChart = null; }
  const ctx = document.getElementById('hrChart').getContext('2d');
  const tickStep = Math.max(1, Math.ceil(labels.length / 14));
  const sparseLabels = labels.map((l,i) => i % tickStep === 0 ? l : '');
  // store allDates snapshot for tooltip
  const dateSnapshot = teamFilter === 'ALL' ? allDates : allDates.filter(date => (teamGameDays[teamFilter]?.[date] || 0) > 0);

  hrChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: sparseLabels,
      datasets: [
        { label:'HR/game', data:hrPerGame, borderColor:'#35c96e', backgroundColor:'rgba(53,201,110,0.08)', borderWidth:1.5, pointRadius:hrPerGame.map((_,i)=>i===hrPerGame.length-1?4:2), pointBackgroundColor:'#35c96e', tension:0.3, fill:true, order:3 },
        { label:'7d',  data:roll7,  borderColor:'#f0c040', backgroundColor:'transparent', borderWidth:2,   pointRadius:0, tension:0.4, borderDash:[4,3],  order:2 },
        { label:'14d', data:roll14, borderColor:'#e07030', backgroundColor:'transparent', borderWidth:2,   pointRadius:0, tension:0.4, borderDash:[8,4],  order:1 },
        { label:'30d', data:roll30, borderColor:'#a060e0', backgroundColor:'transparent', borderWidth:2.5, pointRadius:0, tension:0.4, borderDash:[12,5], order:0 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: {
        legend:{ display:false },
        tooltip:{
          backgroundColor:'#0c1424', borderColor:'#1e3050', borderWidth:1,
          titleColor:'#c8d8ec', bodyColor:'#8aaac0',
          titleFont:{ family:"'JetBrains Mono', monospace", size:11 },
          bodyFont:{ family:"'JetBrains Mono', monospace", size:11 },
          callbacks:{
            title:(items) => {
              const i = items[0].dataIndex;
              const date = dateSnapshot[i];
              const g = teamFilter === 'ALL' ? (dailyGames[date]||0) : (teamGameDays[teamFilter]?.[date]||0);
              return `${labels[i]}  ·  ${g} game${g!==1?'s':''}`;
            },
            label:(item) => {
              const lbls = [' HR/game',' 7d avg',' 14d avg',' 30d avg'];
              return ` ${item.raw.toFixed(2)}${lbls[item.datasetIndex]}`;
            }
          }
        }
      },
      scales:{
        x:{ grid:{color:'#16243a',lineWidth:0.5}, ticks:{color:'#3a5570', font:{family:"'JetBrains Mono', monospace",size:10}, maxRotation:45, autoSkip:false} },
        y:{ grid:{color:'#16243a',lineWidth:0.5}, ticks:{color:'#3a5570', font:{family:"'JetBrains Mono', monospace",size:10}, callback:(v)=>v.toFixed(1)}, min:0 }
      }
    }
  });
}

// ── LEADERS ────────────────────────────────────────────────────────────
function renderLeaders() {
  const players = Object.keys(hrTotals);
  if (!players.length) return;

  const rows = players.map(name => ({
    name,
    hrs:    hrTotals[name],
    games:  playerGames[name] || 1,
    abs:    playerABs[name]   || 0,
    pid:    playerIds[name],
    team:   playerTeams[name] || ''
  })).sort((a,b) => b.hrs - a.hrs || a.abs - b.abs);

  document.getElementById('leaders-meta').textContent = `${rows.length} players with ≥1 HR · sorted by HRs`;

  const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';

  const tableRows = rows.slice(0, 100).map((r, i) => {
    const photoUrl = r.pid ? `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_60,q_auto:best/v1/people/${r.pid}/headshot/67/current` : '';
    const gPerHR = (r.games / r.hrs).toFixed(1);
    const abPerHR = r.abs > 0 ? (r.abs / r.hrs).toFixed(1) : '—';
    return `<tr>
      <td class="lb-rank ${rankClass(i)}">${i+1}</td>
      <td><div class="lb-player">
        ${photoUrl ? `<img class="lb-photo" src="${photoUrl}" alt="">` : '<div class="lb-photo"></div>'}
        <div><div class="lb-name">${r.name}</div><div class="lb-team">${r.team}</div></div>
      </div></td>
      <td class="lb-num hr-col">${r.hrs}</td>
      <td class="lb-num stat-col">${r.games}</td>
      <td class="lb-num stat-col">${gPerHR}</td>
      <td class="lb-num stat-col">${abPerHR}</td>
    </tr>`;
  }).join('');

  document.getElementById('leaders-content').innerHTML = `
    <table class="lb-table">
      <thead><tr>
        <th style="width:28px"></th>
        <th>Player</th>
        <th class="r">HR</th>
        <th class="r">G</th>
        <th class="r">G/HR</th>
        <th class="r">AB/HR</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;
}

// ── DAY AFTER ──────────────────────────────────────────────────────────
function renderDayAfter() {
  const yest = yesterday();
  const dayData = dailyHRs[yest];

  document.getElementById('da-date-row').textContent =
    `Players who homered ${fmtDate(yest)} — watch them today`;

  if (!dayData || !Object.keys(dayData).length) {
    // try the day before yesterday in case today's games haven't finished
    const d2 = new Date(); d2.setUTCDate(d2.getUTCDate() - 2);
    const d2str = d2.toISOString().split('T')[0];
    const d2data = dailyHRs[d2str];
    if (d2data && Object.keys(d2data).length) {
      document.getElementById('da-date-row').textContent =
        `Players who homered ${fmtDate(d2str)} (most recent available)`;
      renderDayAfterData(d2data);
    } else {
      document.getElementById('da-content').innerHTML = '<div class="empty">No data found for yesterday</div>';
    }
    return;
  }
  renderDayAfterData(dayData);
}

function renderDayAfterData(dayData) {
  const sorted = Object.entries(dayData).sort((a,b) => b[1] - a[1]);
  const cards = sorted.map(([name, hrs]) => {
    const pid = playerIds[name];
    const photoUrl = pid ? `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_60,q_auto:best/v1/people/${pid}/headshot/67/current` : '';
    const team = playerTeams[name] || '';
    const seasonHR = hrTotals[name] || hrs;
    return `<div class="da-card">
      ${photoUrl ? `<img class="da-photo" src="${photoUrl}" alt="">` : '<div class="da-photo"></div>'}
      <div class="da-info">
        <div class="da-name">${name}</div>
        <div class="da-sub">${team}${team?' · ':''}${seasonHR} HR season</div>
      </div>
      <div class="da-hr-badge">+${hrs}</div>
    </div>`;
  }).join('');

  document.getElementById('da-content').innerHTML = `
    <div style="font-size:0.62rem;color:var(--muted);margin-bottom:0.6rem;letter-spacing:0.1em;">${sorted.length} PLAYERS · +N = HRs HIT YESTERDAY</div>
    <div class="da-grid">${cards}</div>`;
}

// ── UI helpers ─────────────────────────────────────────────────────────
function setStatus(type, msg) {
  document.getElementById('status-bar').className = type;
  document.getElementById('status-text').textContent = msg;
}
function setProgress(done, total) {
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done}/${total} (${pct}%)`;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

document.addEventListener('DOMContentLoaded', fetchAll);
</script>
